<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 绘图视觉工作站 (Cloud Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #00b96b; --primary-hover: #009a59; --bg: #f4f5f9; --border: #e5e6eb; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* 侧边栏优化 */
        .sidebar { width: 320px; background: #fff; border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .main { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; min-width: 0; }
        
        #chat-history { flex: 1; background: #fff; border-radius: 12px; padding: 20px; overflow-y: auto; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        
        /* 🚀 图片预览区 */
        .image-result-box { 
            width: 256px; height: auto; min-height: 144px;
            background: #f8f9fa; border-radius: 8px; cursor: pointer; 
            margin: 10px 0; overflow: hidden; position: relative; 
            border: 1px solid var(--border); transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .image-result-box:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        .image-result-box img { width: 100%; height: auto; display: block; }

        /* 基础控件 */
        .btn { padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 10px; font-size: 14px; box-shadow: 0 4px 12px rgba(0,185,107,0.2); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-outline { background: #fff; color: #666; border: 1px solid #ddd; margin-top: 5px; }
        .btn-outline:hover { background: #f9f9f9; border-color: #ccc; }

        .sys-group { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #eee; }
        label { font-size: 11px; font-weight: bold; color: #888; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input { font-size: 13px; padding: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; outline: none; background: #fff; }

        /* 输入区优化 */
        .input-area { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-top: 15px; flex-shrink: 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.03); }
        .rich-input { width: 100%; min-height: 60px; max-height: 120px; overflow-y: auto; padding: 10px; box-sizing: border-box; border: 1px solid #eee; border-radius: 8px; outline: none; font-size: 15px; line-height: 1.5; background: #fcfcfc; }
        
        .inline-pill { display: inline-flex; align-items: center; background: #e6f8ee; border: 1px solid #a3ebd0; border-radius: 4px; padding: 2px 6px; margin: 0 4px; vertical-align: middle; }
        .inline-pill img { width: 18px; height: 18px; object-fit: cover; border-radius: 2px; margin-right: 4px; }

        /* 弹窗及错误日志 */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; }
        #modal img { max-width: 90%; max-height: 90%; border-radius: 4px; }
        
        .error-console { border: 1px solid #fadcda; background: #fff; border-radius: 8px; margin-top: 10px; }
        .error-header { background: #ffece8; color: #f53f3f; padding: 8px 12px; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .error-body { display: none; background: #1e1e1e; padding: 10px; }
        #errorLogText { width: 100%; height: 60px; background: transparent; color: #ff8a8a; border: none; font-size: 11px; font-family: monospace; }
        
        .image-preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
        .img-container { position: relative; aspect-ratio: 1; border-radius: 4px; overflow: hidden; border: 1px solid #eee; }
        .img-thumb { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="margin: 0 0 25px 0; color: var(--primary); display: flex; align-items: center; gap: 8px;">
        <span>🎨</span> Visual Workstation
    </h3>
    
    <div style="background: #e6f8ee; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 11px; color: var(--primary); font-weight: bold; text-align: center;">
        🍌 nano banana pro
    </div>

    <label>核心生成模型</label>
    <select id="modelSelect" onchange="handleModelChange()">
        <option value="nano-banana-pro">Nano Banana Pro</option>
        <option value="dall-e-3">DALL-E 3</option>
        <option value="stable-diffusion-xl">Stable Diffusion XL</option>
    </select>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div>
            <label>生成比例</label>
            <select id="ratio" onchange="handleRatioChange()">
                <option value="1:1">1:1 (方图)</option>
                <option value="16:9">16:9 (横图)</option>
                <option value="9:16">9:16 (竖图)</option>
                <option value="21:9">21:9 (电影)</option>
                <option value="4:3">4:3 (电视)</option>
                <option value="custom">自定义...</option>
            </select>
            <input type="text" id="customRatio" placeholder="如 2:3" style="display:none; margin-top:-8px;">
        </div>
        <div>
            <label>图片数量</label>
            <select id="imageCount">
                <option value="1">1 张</option>
                <option value="2">2 张</option>
                <option value="3">3 张</option>
                <option value="4">4 张</option>
            </select>
        </div>
    </div>

    <div class="sys-group">
        <label>🖼️ 参考图库 / 垫图 (@ 引用)</label>
        <input type="file" id="multiInput" multiple accept="image/*" onchange="handleMultiUpload(this)">
        <div id="multiPreviewGrid" class="image-preview-grid"></div>
        <button class="btn btn-outline" style="width:100%; font-size:11px;" onclick="clearMultiImages()">清空参考图</button>
    </div>

    <button class="btn btn-primary" onclick="runTask()">✨ 立即开始生成</button>

    <div style="margin-top: auto; padding-top: 20px; display: flex; gap: 5px;">
        <button class="btn btn-outline" style="flex:1;" onclick="exportHistory()">导出</button>
        <button class="btn btn-outline" style="flex:1;" onclick="document.getElementById('importFile').click()">导入</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importHistory(event)">
</div>

<div class="main">
    <div id="chat-history"></div>
    
    <div class="input-area">
        <div id="prompt" class="rich-input" contenteditable="true" data-placeholder="输入提示词... 使用 @ 引用参考图库中的图片"></div>
        <div id="mentionMenu" style="display:none; position:fixed; background:#fff; border:1px solid #ddd; padding:8px; border-radius:8px; z-index:1000; box-shadow:0 8px 24px rgba(0,0,0,0.15);">
            <div id="mentionMenuGrid" style="display:grid; grid-template-columns:repeat(4, 45px); gap:5px;"></div>
        </div>
    </div>
    
    <div id="errorConsole" class="error-console">
        <div class="error-header" onclick="toggleError()"><span>⚠️ 错误监控日志</span><span id="errStatus">▲</span></div>
        <div class="error-body" id="errBody"><textarea id="errorLogText" readonly></textarea></div>
    </div>
</div>

<div id="modal" onclick="closeModal()"><img id="modalImg" src=""></div>

<script>
    // 🌟 全局配置
    const MODEL_CONFIG = {
        "nano-banana-pro": {
            name: "Nano Banana Pro",
            apiUrl: "https://proxy-server-0m02.onrender.com/api/image/create"
        },
        "dall-e-3": {
            name: "DALL-E 3",
            apiUrl: "https://proxy-server-0m02.onrender.com/api/image/create"
        },
        "stable-diffusion-xl": {
            name: "Stable Diffusion XL",
            apiUrl: "https://proxy-server-0m02.onrender.com/api/image/create"
        }
    };

    // 🌟 变量声明（确保只声明一次）
    let history = JSON.parse(localStorage.getItem('seed_img_history') || '[]');
    let multiImages = [];
    let savedRange = null;

    window.onload = () => { render(); };

    // 模型切换处理
    function handleModelChange() {
        console.log("模型已切换至:", document.getElementById('modelSelect').value);
    }

    // 比例切换处理
    function handleRatioChange() { 
        document.getElementById('customRatio').style.display = document.getElementById('ratio').value === 'custom' ? 'block' : 'none';
    }

    // 图片上传处理
    function handleMultiUpload(inp) {
        Array.from(inp.files).forEach(f => {
            const r = new FileReader();
            r.onload = (e) => { multiImages.push(e.target.result); refreshMultiGrid(); };
            r.readAsDataURL(f);
        });
        inp.value = "";
    }
    
    function refreshMultiGrid() {
        document.getElementById('multiPreviewGrid').innerHTML = multiImages.map((img,i)=>`
            <div class="img-container"><img src="${img}" style="width:100%;height:100%;object-fit:cover;"></div>
        `).join('');
    }

    function clearMultiImages() {
        multiImages = [];
        refreshMultiGrid();
    }

    // 🌟 核心：生图任务
    async function runTask() {
        const promptEl = document.getElementById('prompt');
        let rawText = "";
        let inlineImgs = [];
        
        promptEl.childNodes.forEach(node => {
            if (node.nodeType === Node.TEXT_NODE) rawText += node.textContent;
            else if (node.nodeType === Node.ELEMENT_NODE) {
                if (node.classList.contains('inline-pill')) inlineImgs.push(node.getAttribute('data-b64'));
                else rawText += node.innerText;
            }
        });
        
        const pText = rawText.trim();
        if(!pText) return alert("请输入提示词！");

        const id = Date.now();
        const ratio = document.getElementById('ratio').value === 'custom' ? document.getElementById('customRatio').value : document.getElementById('ratio').value;
        const modelKey = document.getElementById('modelSelect').value;
        const config = MODEL_CONFIG[modelKey]; // 🌟 使用配置对象

        history.unshift({ id, prompt: pText, status: 'loading', urls: [] });
        render();

        try {
            const response = await fetch(config.apiUrl, { // 🌟 动态获取 URL
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-access-code': localStorage.getItem('my_api_access_code') 
                },
                body: JSON.stringify({
                    model: modelKey,
                    prompt: pText,
                    ratio: ratio,
                    n: parseInt(document.getElementById('imageCount').value),
                    images: inlineImgs 
                })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}: 授权失败或后端未响应`);
            
            const data = await response.json();
            const urls = data.data ? data.data.map(d => d.url) : [data.url];
            
            update(id, 'success', urls);
        } catch (e) {
            logError(e.message);
            update(id, 'failed', []);
        }
    }

    function update(id, s, urls) {
        const i = history.find(x => x.id === id);
        if(i) { i.status = s; i.urls = urls; localStorage.setItem('seed_img_history', JSON.stringify(history)); render(); }
    }

    function render() {
        document.getElementById('chat-history').innerHTML = history.map(item => `
            <div class="task-card" style="background:#fff; border:1px solid #eee; border-radius:12px; padding:15px; margin-bottom:15px;">
                <div style="font-size:13px; margin-bottom:8px;"><b>Prompt:</b> ${item.prompt}</div>
                ${item.status === 'loading' ? '<div style="color:var(--primary); font-size:12px;">✨ 正在构思画面中...</div>' : ''}
                ${item.status === 'success' ? `<div style="display:flex; gap:10px; flex-wrap:wrap;">${item.urls.map(u => `<div class="image-result-box" onclick="showFull('${u}')"><img src="${u}"></div>`).join('')}</div>` : ''}
                ${item.status === 'failed' ? '<div style="color:red; font-size:12px;">❌ 生成失败，请检查暗号或后台配置。</div>' : ''}
                <div style="margin-top:10px;"><button class="btn btn-outline" style="font-size:10px; padding:4px 8px;" onclick="deleteItem(${item.id})">删除</button></div>
            </div>
        `).join('');
    }

    function deleteItem(id) { history = history.filter(x => x.id !== id); localStorage.setItem('seed_img_history', JSON.stringify(history)); render(); }
    function logError(m) { const el = document.getElementById('errorLogText'); el.value = `[${new Date().toLocaleTimeString()}] ${m}\n` + el.value; }
    function toggleError() { const b = document.getElementById('errBody'); b.style.display = b.style.display === 'block' ? 'none' : 'block'; }
    function showFull(u) { const m = document.getElementById('modal'); document.getElementById('modalImg').src = u; m.style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    
    // 导入导出功能补全
    function exportHistory() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(history));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "drawing_history.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function importHistory(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                history = imported;
                localStorage.setItem('seed_img_history', JSON.stringify(history));
                render();
            } catch (err) { alert("导入失败，文件格式错误"); }
        };
        reader.readAsText(file);
    }

    // @ 引用逻辑保持
    const promptEl = document.getElementById('prompt');
    promptEl.addEventListener('input', (e) => {
        const sel = window.getSelection();
        const range = sel.getRangeAt(0);
        const text = range.startContainer.textContent || "";
        if(text.endsWith('@') && multiImages.length > 0) {
            savedRange = range.cloneRange();
            showMenu(range);
        }
    });

    function showMenu(range) {
        const menu = document.getElementById('mentionMenu');
        const rect = range.getBoundingClientRect();
        menu.style.display = 'block';
        menu.style.left = rect.left + 'px';
        menu.style.top = (rect.bottom + 5) + 'px';
        document.getElementById('mentionMenuGrid').innerHTML = multiImages.map((img,i)=>`
            <div onclick="insertImg('${img}')" style="cursor:pointer; width:45px; height:45px; border-radius:4px; overflow:hidden;"><img src="${img}" style="width:100%;height:100%;object-fit:cover;"></div>
        `).join('');
    }

    function insertImg(img) {
        document.getElementById('mentionMenu').style.display = 'none';
        const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange);
        document.execCommand('delete'); 
        const span = document.createElement('span');
        span.className = 'inline-pill'; span.contentEditable = 'false';
        span.setAttribute('data-b64', img);
        span.innerHTML = `<img src="${img}"><span>Ref</span>`;
        savedRange.insertNode(span);
        promptEl.focus();
    }
</script>
</body>
</html>
